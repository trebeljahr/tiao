name: tests

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'client/package-lock.json', 'server/package-lock.json') }}

      - name: Install root dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Install client dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm --prefix client ci

      - name: Install server dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm --prefix server ci

      - name: Build repo
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    services:
      redis-integration:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            server/node_modules
          key: nm-integration-${{ runner.os }}-${{ hashFiles('package-lock.json', 'server/package-lock.json') }}

      - name: Install root dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Install server dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm --prefix server ci

      - name: Run integration tests
        run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    services:
      mongo-e2e:
        image: mongo:7
        ports:
          - 27018:27017
      redis-e2e:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: nm-e2e-${{ runner.os }}-${{ hashFiles('package-lock.json', 'client/package-lock.json', 'server/package-lock.json') }}

      - name: Install root dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Install client dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm --prefix client ci

      - name: Install server dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm --prefix server ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Start MinIO and install Playwright (parallel)
        run: |
          # Start MinIO in background
          docker run -d --name tiao-e2e-minio \
            -p 9002:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --tmpfs /data \
            minio/minio:latest server /data

          # Install Playwright while MinIO starts
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install-deps chromium
          fi

          # Now initialize MinIO bucket (should be ready by now)
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:9002/minio/health/live; then break; fi
            sleep 1
          done
          curl -sSfL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc && chmod +x /tmp/mc
          /tmp/mc alias set ci http://127.0.0.1:9002 minioadmin minioadmin
          /tmp/mc mb --ignore-existing ci/tiao-e2e
          /tmp/mc anonymous set download ci/tiao-e2e

      - name: Run e2e tests
        # `test:e2e` builds the client once then runs playwright; playwright's
        # webServer starts the prebuilt prod server once for the whole suite
        # and all tests (both workers) share it. No per-test rebuild.
        run: npm run test:e2e
        env:
          CI: "true"
          MONGODB_URI: mongodb://127.0.0.1:27018/tiao-e2e
          TOKEN_SECRET: e2e-secret
