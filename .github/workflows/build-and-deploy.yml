name: build-and-deploy

on:
  push:
    branches:
      - main

concurrency:
  group: tiao-main-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Build repo
        run: npm run build

      - name: Run server unit tests
        run: npm run test:unit

  e2e:
    runs-on: ubuntu-latest
    services:
      mongo-e2e:
        image: mongo:7
        ports:
          - 27018:27017
      redis-e2e:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json
            package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Build repo
        run: npm run build

      - name: Start MinIO and initialize bucket
        run: |
          docker run -d --name tiao-e2e-minio \
            -p 9002:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --tmpfs /data \
            minio/minio:latest server /data
          # Wait for MinIO to be ready
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:9002/minio/health/live; then break; fi
            sleep 1
          done
          curl -sSfL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc && chmod +x /tmp/mc
          /tmp/mc alias set ci http://127.0.0.1:9002 minioadmin minioadmin
          /tmp/mc mb --ignore-existing ci/tiao-e2e
          /tmp/mc anonymous set download ci/tiao-e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test
        env:
          CI: "true"
          MONGODB_URI: mongodb://127.0.0.1:27018/tiao-e2e
          TOKEN_SECRET: e2e-secret

  build-client:
    needs: [verify, e2e]
    runs-on: ubuntu-latest
    env:
      COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_CLIENT_RESOURCE_UUID }}
      COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_CLIENT_DEPLOY_WEBHOOK }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-client
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger client deployment via API
        if: ${{ env.COOLIFY_BASE_URL != '' && env.COOLIFY_API_TOKEN != '' && env.COOLIFY_RESOURCE_UUID != '' }}
        run: |
          curl -fsS \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            -X POST \
            "$COOLIFY_BASE_URL/api/v1/deploy?uuid=$COOLIFY_RESOURCE_UUID"

      - name: Trigger legacy client deployment webhook
        if: ${{ (env.COOLIFY_BASE_URL == '' || env.COOLIFY_API_TOKEN == '' || env.COOLIFY_RESOURCE_UUID == '') && env.COOLIFY_DEPLOY_WEBHOOK != '' }}
        run: curl -fsS -X POST "$COOLIFY_DEPLOY_WEBHOOK"

  build-server:
    needs: [verify, e2e]
    runs-on: ubuntu-latest
    env:
      COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_SERVER_RESOURCE_UUID }}
      COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_SERVER_DEPLOY_WEBHOOK }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-server
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger server deployment via API
        if: ${{ env.COOLIFY_BASE_URL != '' && env.COOLIFY_API_TOKEN != '' && env.COOLIFY_RESOURCE_UUID != '' }}
        run: |
          curl -fsS \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            -X POST \
            "$COOLIFY_BASE_URL/api/v1/deploy?uuid=$COOLIFY_RESOURCE_UUID"

      - name: Trigger legacy server deployment webhook
        if: ${{ (env.COOLIFY_BASE_URL == '' || env.COOLIFY_API_TOKEN == '' || env.COOLIFY_RESOURCE_UUID == '') && env.COOLIFY_DEPLOY_WEBHOOK != '' }}
        run: curl -fsS -X POST "$COOLIFY_DEPLOY_WEBHOOK"
