name: desktop-release

# Builds the Tiao desktop Electron app on all three platforms and
# uploads the installers as both workflow artifacts (for ad-hoc
# testing) and draft GitHub Release assets (for real releases).
#
# Triggered by:
#   - `workflow_dispatch` (manual, via the Actions tab)
#   - `push: tags: desktop-v*` (tag-based release, e.g. desktop-v1.0.0)
#
# Completely separate from `build-and-deploy.yml` — that workflow
# builds client+server Docker images for the web deployment and
# doesn't touch any desktop artifacts.
#
# Signing: unsigned across all three platforms in Phase 3a. The
# APPLE_* env var hooks are referenced below but resolve to empty
# strings until the macOS code signing follow-up worktree lands.
# Once signing is wired up, populate the secrets AND flip
# `build.mac.hardenedRuntime` + `build.mac.gatekeeperAssess` to true
# in desktop/package.json — Apple's notary service rejects signed
# apps that don't have hardenedRuntime enabled, so leaving them
# false alongside signing creds will fail every build at the
# notarize step.

on:
  workflow_dispatch:
    inputs:
      publish_draft:
        description: "Create a draft GitHub Release with the artifacts"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "desktop-v*"

concurrency:
  group: tiao-desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed for softprops/action-gh-release to create drafts

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS (arm64 + x64)
            artifact_glob: "desktop/dist/*.dmg"
          - os: windows-latest
            name: Windows (x64)
            artifact_glob: "desktop/dist/*.exe"
          - os: ubuntu-latest
            name: Linux (AppImage, x64)
            artifact_glob: "desktop/dist/*.AppImage"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json
            desktop/package-lock.json

      - name: Install root + all workspaces (incl. desktop)
        # SKIP_DESKTOP is NOT set — we want `npm --prefix desktop install`
        # to run so electron + electron-builder are available below.
        run: npm install

      - name: Build static export for desktop
        run: npm --prefix client run build:desktop
        env:
          NEXT_PUBLIC_PLATFORM: desktop
          NEXT_PUBLIC_DESKTOP_API_URL: https://api.playtiao.com

      - name: Stage client bundle into desktop/
        # Mirror what desktop/scripts/release.sh does so the protocol
        # handler finds client-bundle/ at package time.
        run: npm --prefix desktop run dev:build-client

      - name: Package
        run: npm --prefix desktop run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Desktop build-time constants baked into the shipped JS.
          TIAO_DESKTOP_VERSION: ${{ github.ref_name }}
          TIAO_API_URL: https://api.playtiao.com
          TIAO_OPENPANEL_API_URL: https://analytics-api.trebeljahr.com
          TIAO_OPENPANEL_CLIENT_ID: ${{ secrets.OPENPANEL_DESKTOP_CLIENT_ID }}
          # macOS signing hooks — resolve to empty strings until the
          # follow-up worktree populates them.  electron-builder
          # detects the missing creds and skips signing (with a
          # warning) rather than failing the build.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiao-desktop-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

      - name: Attach to draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v') || inputs.publish_draft == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: true
